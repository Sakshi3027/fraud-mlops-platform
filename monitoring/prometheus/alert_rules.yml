groups:
  - name: fraud_detection_alerts
    interval: 30s
    rules:

      - alert: HighFraudRate
        expr: |
          (
            rate(fraud_detected_total[5m])
            /
            rate(fraud_predictions_total[5m])
          ) > 0.10
        for: 2m
        labels:
          severity: critical
          trigger: retrain
        annotations:
          summary: "Fraud rate above 10% — possible drift"
          description: "Fraud rate is {{ $value | humanizePercentage }} over last 5m"

      - alert: HighPredictionLatency
        expr: |
          histogram_quantile(0.99,
            rate(fraud_prediction_latency_seconds_bucket[5m])
          ) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 prediction latency above 100ms"
          description: "P99 latency is {{ $value | humanizeDuration }}"

      - alert: ModelNotServing
        expr: |
          rate(fraud_predictions_total[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "No predictions being served"
          description: "Model has not served predictions for 5 minutes"

      - alert: ChampionChallengerDivergence
        expr: |
          abs(
            rate(fraud_detected_total{model_role="champion"}[10m])
            -
            rate(fraud_detected_total{model_role="challenger"}[10m])
          ) > 0.15
        for: 5m
        labels:
          severity: warning
          trigger: retrain
        annotations:
          summary: "Champion and challenger models diverging"
          description: "Model divergence detected — consider retraining"