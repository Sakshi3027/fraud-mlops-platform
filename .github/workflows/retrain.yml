name: Fraud Detection MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'models/**'
      - 'pipelines/**'
      - 'data_pipeline/**'
      - 'tests/**'
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pytest scikit-learn xgboost pandas numpy mlflow \
                      kafka-python fastapi prometheus-client httpx pydantic \
                      redis kfp PyYAML

      - name: Run tests
        run: pytest tests/ -v --tb=short

  train-and-evaluate:
    name: Train all models
    runs-on: ubuntu-latest
    needs: test
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow_ci.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install scikit-learn xgboost pandas numpy mlflow

      - name: Train Logistic Regression
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          os.environ['MLFLOW_TRACKING_URI'] = 'sqlite:///mlflow_ci.db'
          import mlflow
          mlflow.set_tracking_uri('sqlite:///mlflow_ci.db')
          from models.logistic_regression import train
          result = train(mlflow_tracking_uri='sqlite:///mlflow_ci.db')
          print('LR AUC:', result['metrics']['auc'])
          "

      - name: Train Random Forest
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from models.random_forest import train
          result = train(mlflow_tracking_uri='sqlite:///mlflow_ci.db')
          print('RF AUC:', result['metrics']['auc'])
          "

      - name: Train XGBoost
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from models.xgboost_model import train
          result = train(mlflow_tracking_uri='sqlite:///mlflow_ci.db')
          print('XGB AUC:', result['metrics']['auc'])
          "

      - name: Compare models
        run: |
          python -c "
          import mlflow
          mlflow.set_tracking_uri('sqlite:///mlflow_ci.db')
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name('fraud-detection')
          if exp:
              runs = client.search_runs(exp.experiment_id, order_by=['metrics.auc DESC'])
              print('--- Model Comparison ---')
              for r in runs:
                  print(f\"{r.data.tags.get('mlflow.runName','?'):30s} AUC: {r.data.metrics.get('auc', 0):.4f}\")
              best = runs[0]
              print(f\"Winner: {best.data.tags.get('mlflow.runName','?')} | AUC: {best.data.metrics.get('auc',0):.4f}\")
          "

  compile-pipeline:
    name: Compile Kubeflow pipeline
    runs-on: ubuntu-latest
    needs: train-and-evaluate
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install KFP
        run: pip install kfp==2.16.0

      - name: Compile pipeline
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from pipelines.pipeline import compile_pipeline
          compile_pipeline('pipeline.yaml')
          print('Pipeline compiled successfully')
          "

      - name: Upload pipeline artifact
        uses: actions/upload-artifact@v4
        with:
          name: kubeflow-pipeline
          path: pipeline.yaml
          retention-days: 30

  drift-check:
    name: Check for model drift
    runs-on: ubuntu-latest
    needs: train-and-evaluate
    env:
      MLFLOW_TRACKING_URI: sqlite:///mlflow_ci.db
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install scipy numpy pandas redis

      - name: Run drift check
        run: python pipelines/drift_detector.py