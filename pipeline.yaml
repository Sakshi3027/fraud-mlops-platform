          \ *\n\ndef train_model(\n    model_type: str,\n    n_samples: int,\n   \
          \ mlflow_tracking_uri: str,\n    metrics: Output[Metrics],\n    model_artifact:\
          \ Output[Model]\n):\n    import numpy as np\n    import pandas as pd\n \
          \   import mlflow\n    import json\n\n    FEATURES = [\n        \"amount\"\
          , \"amount_zscore\", \"avg_amount_last_50\",\n        \"std_amount_last_50\"\
          , \"unique_countries_count\",\n        \"transactions_last_hour\", \"hour_of_day\"\
          , \"is_international\"\n    ]\n\n    def make_data(n, seed):\n        np.random.seed(seed)\n\
