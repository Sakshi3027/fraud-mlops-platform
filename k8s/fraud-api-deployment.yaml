apiVersion: apps/v1
kind: Deployment
metadata:
  name: fraud-detection-api
  labels:
    app: fraud-detection-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fraud-detection-api
  template:
    metadata:
      labels:
        app: fraud-detection-api
    spec:
      containers:
      - name: fraud-api
        image: python:3.12-slim
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow-service:5000"
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip install fastapi uvicorn redis prometheus-client pydantic kafka-python --quiet &&
          echo 'healthy' > /tmp/health &&
          python -c "
          import uvicorn
          from fastapi import FastAPI
          from fastapi.responses import HTMLResponse, PlainTextResponse
          from fastapi.middleware.cors import CORSMiddleware
          from prometheus_client import Counter, Histogram, generate_latest
          import random, time, json, os
          import redis as redis_lib

          app = FastAPI(title='Fraud Detection API')
          app.add_middleware(CORSMiddleware, allow_origins=['*'], allow_methods=['*'], allow_headers=['*'])

          PREDICTIONS = Counter('fraud_predictions_total', 'Total predictions', ['model_role', 'prediction'])
          LATENCY = Histogram('fraud_prediction_latency_seconds', 'Latency', ['model_role'])
          FRAUD = Counter('fraud_detected_total', 'Fraud detected', ['model_role'])

          try:
              r = redis_lib.Redis(host=os.environ.get('REDIS_HOST','localhost'), port=6379, decode_responses=True)
              r.ping()
          except:
              r = None

          @app.get('/health')
          def health(): return {'status': 'healthy', 'cluster': 'gke', 'region': 'us-central1'}

          @app.post('/predict')
          def predict(body: dict):
              start = time.time()
              role = random.choices(['champion','challenger','shadow'], weights=[0.8,0.15,0.05])[0]
              amount = body.get('amount', 0)
              hour = body.get('hour_of_day', 12)
              velocity = body.get('transactions_last_hour', 1)
              intl = body.get('is_international', 0)
              score = 0.01
              if amount > 500: score += 0.4
              if hour < 6: score += 0.3
              if velocity > 7: score += 0.2
              if intl: score += 0.1
              prob = min(score, 0.99)
              pred = int(prob > 0.5)
              latency = (time.time() - start) * 1000
              PREDICTIONS.labels(model_role=role, prediction=str(pred)).inc()
              LATENCY.labels(model_role=role).observe(latency/1000)
              if pred: FRAUD.labels(model_role=role).inc()
              if r:
                  record = json.dumps({'transaction_id': body.get('transaction_id','?'), 'prediction': pred, 'probability': round(prob,4), 'model_role': role, 'latency_ms': round(latency,2)})
                  r.lpush('prediction_log', record)
                  r.ltrim('prediction_log', 0, 9999)
              return {'transaction_id': body.get('transaction_id','?'), 'is_fraud': bool(pred), 'fraud_probability': round(prob,4), 'model_role': role, 'latency_ms': round(latency,2)}

          @app.get('/metrics', response_class=PlainTextResponse)
          def metrics(): return generate_latest()

          @app.get('/models/stats')
          def stats(): return {'champion': {'model_name': 'fraud-xgboost', 'weight': 0.8}, 'challenger': {'model_name': 'fraud-random-forest', 'weight': 0.15}, 'shadow': {'model_name': 'fraud-logistic-regression', 'weight': 0.05}}

          uvicorn.run(app, host='0.0.0.0', port=8000)
          "
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fraud-api-service
spec:
  selector:
    app: fraud-detection-api
  ports:
  - port: 80
    targetPort: 8000
  type: LoadBalancer
